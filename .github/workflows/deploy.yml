name: Deploy to CloudBase

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup environment variables
        run: |
          echo "VITE_ENV_ID=${{ secrets.TCB_ENV_ID }}" > .env
          echo "VITE_PUBLISHABLE_KEY=${{ secrets.VITE_PUBLISHABLE_KEY }}" >> .env

      - name: Build
        run: npm run build

      - name: Deploy to CloudBase
        uses: TencentCloudBase/cloudbase-action@v1
        with:
          secretId: ${{ secrets.TCB_SECRET_ID }}
          secretKey: ${{ secrets.TCB_SECRET_KEY }}
          envId: ${{ secrets.TCB_ENV_ID }}
          staticSrcPath: ./dist
          staticDestPath: /
